name: Build and Release Android App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest
    outputs:
      VERSION_NAME: ${{ steps.get_version.outputs.VERSION_NAME }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Environment Files
        run: |
          if [ -f ".env.example" ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ -f "debug.keystore" ]; then
            echo "debug.keystore already exists."
          else
            echo "No debug.keystore found."
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper if Missing
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Gradlew not found! Generating Gradle wrapper..."
            gradle wrapper --gradle-version 9.3.1
          fi
          chmod +x gradlew

      - name: Extract App Version
        id: get_version
        run: |
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/' | tr -d '[:space:]')
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="1.0"
          fi
          # If triggered by tag, use the tag name (without leading v), else append run number
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            REF_NAME="${{ github.ref_name }}"
            VERSION_NAME="${REF_NAME#v}"
          else
            VERSION_NAME="${VERSION_NAME}.${{ github.run_number }}"
          fi
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Extracted App Version: $VERSION_NAME"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH || format('{0}/debug.keystore', github.workspace) }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'android' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'androiddebugkey' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}

      - name: Prepare Signed APK with Clean Naming
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: Release APK not found!"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          mv "$APK_PATH" "Cut Pro (${{ env.VERSION_NAME }}).apk"
          echo "Renamed APK to: Cut Pro (${{ env.VERSION_NAME }}).apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cut-pro-release-apk
          path: Cut Pro (${{ env.VERSION_NAME }}).apk

  release:
    name: Auto Release to GitHub
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK from Build Job
        uses: actions/download-artifact@v4
        with:
          name: cut-pro-release-apk
          path: .

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', needs.build.outputs.VERSION_NAME) }}
          name: Release ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', needs.build.outputs.VERSION_NAME) }}
          files: Cut Pro *.apk
          body: |
            Automated production build and "Pure Signed" Release for Cut Pro.
            
            **App Version:** ${{ needs.build.outputs.VERSION_NAME }}
            **Source Commit:** ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
